name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.14'
  
    - run: pip install -e .

    - run: pip install pytest ruff black

    - run: ruff check .

    - run: black --check .

    - run: pytest